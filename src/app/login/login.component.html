<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-4">AEM Enersol Sign In</h3>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group mb-3">
        <label>Email address</label>
        <input type="email" formControlName="username" class="form-control" 
               [ngClass]="{ 'is-invalid': isSubmitted && f['username'].errors }" />
        
        <div *ngIf="isSubmitted && f['username'].errors" class="invalid-feedback">
          <div *ngIf="f['username'].errors['required']">Email is required</div>
          <div *ngIf="f['username'].errors['email']">Must be a valid email format</div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" 
               [ngClass]="{ 'is-invalid': isSubmitted && f['password'].errors }" />
        
        <div *ngIf="isSubmitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Must be at least 6 characters</div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</div>
