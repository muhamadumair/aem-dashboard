<div class="login-page">
    <div class="login-card card shadow-sm">
        <div class="card-header bg-light text-center">
            <strong>Sign in to your dashboard</strong>
        </div>
        <div class="card-body p-4">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="form-group mb-3">
                    <input type="email" formControlName="username" class="form-control"
                        placeholder="Username"
                        [ngClass]="{ 'is-invalid': isSubmitted && f['username'].errors }" />
                    <div *ngIf="isSubmitted && f['username'].errors" class="invalid-feedback">
                        <div *ngIf="f['username'].errors['required']">Email is required</div>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <input type="password" formControlName="password" class="form-control"
                        placeholder="Password"
                        [ngClass]="{ 'is-invalid': isSubmitted && f['password'].errors }" />
                    <div *ngIf="isSubmitted && f['password'].errors" class="invalid-feedback">
                        <div *ngIf="f['password'].errors['required']">Password is required</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary text-uppercase fw-bold">Sign In</button>

                <div *ngIf="errorMessage" class="alert alert-danger text-center mt-3 mb-0">
                    {{ errorMessage }}
                </div>
            </form>
        </div>
    </div>
</div>
