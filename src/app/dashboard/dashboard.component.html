<div class="container py-4">
    <h2 class="mb-3">Overview</h2>
    <div class="row mb-5">
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white">
                    <strong>Card Title</strong>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper">
                        <canvas baseChart [data]="donutChartData" [type]="'doughnut'"[options]="donutChartOptions"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white">
                    <strong>Card Title</strong>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper">
                        <canvas baseChart [data]="barChartData" [type]="'bar'" [options]="barChartOptions"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h2 class="mb-3">User List</h2>
    <div class="row">
        <div class="col-12">
            <table class="table table-bordered bg-white text-center align-middle">
                <thead class="thead-light">
                    <tr>
                        <th style="width: 60px;">#</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>User Name</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let user of userData; let i = index">
                        <td>{{ i + 1 }}</td>
                        <td>{{ user.firstName }}</td>
                        <td>{{ user.lastName }}</td>
                        <td>{{ user.username }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
